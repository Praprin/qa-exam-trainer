<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISTQB Glossary Trainer</title>
<style>
:root{
  --bg:#0a0a0a; --card:#111111; --card-hover:#181818; --input:#0d0d0d;
  --border:#1e1e1e; --border-lit:#2a2a2a;
  --text:#e0e0e0; --text-2:#888; --text-mut:#555;
  --accent:#ff2d2d; --accent-dim:#991a1a; --accent-glow:rgba(255,45,45,.12);
  --green:#00ff41; --yellow:#ffd600; --blue:#4dabf7; --purple:#a78bfa;
  --orange:#ff9f43; --pink:#ff6b9d; --cyan:#22d3ee;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);
  font-family:'Segoe UI',-apple-system,system-ui,Roboto,sans-serif;line-height:1.55;
  -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(circle at 50% -10%, rgba(255,45,45,.06), transparent 55%);}
.wrap{max-width:900px;margin:0 auto;padding:24px 20px 80px}
a{color:var(--blue)}

.top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:6px}
.brand{display:flex;align-items:center;gap:12px}
.brand .logo{width:40px;height:40px;border-radius:9px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--accent),var(--accent-dim));font-weight:800;font-size:13px;color:#fff;
  box-shadow:0 0 22px var(--accent-glow)}
.brand h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.brand .sub{color:var(--text-2);font-size:12px;margin-top:1px}

.langtoggle{display:flex;border:1px solid var(--border-lit);border-radius:9px;overflow:hidden;flex:none}
.langtoggle button{background:transparent;border:none;color:var(--text-2);padding:8px 14px;
  font-size:13px;font-weight:700;cursor:pointer;transition:.12s}
.langtoggle button.on{background:var(--accent);color:#fff}
.langtoggle button:not(.on):hover{background:var(--card-hover);color:var(--text)}

.lead{color:var(--text-2);font-size:14px;margin:16px 0 6px;max-width:660px}
.note{font-size:12px;color:var(--text-mut);margin-bottom:20px;max-width:660px}
.section-title{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-mut);
  margin:24px 0 12px;font-weight:700}

.modes{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.mode{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;
  transition:.15s;text-align:left;position:relative}
.mode:hover{border-color:var(--accent);background:var(--card-hover);transform:translateY(-2px)}
.mode .ic{font-size:22px;margin-bottom:8px}
.mode .t{font-weight:700;font-size:14px;margin-bottom:3px}
.mode .d{color:var(--text-2);font-size:12px}

.topics{display:flex;flex-wrap:wrap;gap:9px}
.chip{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);background:var(--card);
  border-radius:999px;padding:8px 14px;cursor:pointer;font-size:13px;transition:.13s;user-select:none}
.chip:hover{border-color:var(--border-lit);background:var(--card-hover)}
.chip.on{border-color:currentColor;background:var(--accent-glow)}
.chip .dot{width:9px;height:9px;border-radius:50%;background:currentColor;flex:none}
.chip .n{color:var(--text-mut);font-size:11px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;
  border:none;border-radius:10px;padding:13px 24px;font-size:14.5px;font-weight:700;cursor:pointer;transition:.15s}
.btn:hover{filter:brightness(1.1);box-shadow:0 6px 26px var(--accent-glow)}
.btn:disabled{opacity:.4;cursor:not-allowed;filter:none;box-shadow:none}
.btn.ghost{background:transparent;border:1px solid var(--border-lit);color:var(--text)}
.btn.ghost:hover{border-color:var(--accent);color:#fff;background:var(--accent-glow)}
.btn.sm{padding:9px 16px;font-size:13px}
.btn-row{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap;align-items:center}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px}
.hidden{display:none!important}

.qtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:14px}
.qcount{font-size:13px;color:var(--text-2)} .qcount b{color:var(--text)}
.cat-tag{font-size:11px;font-weight:700;padding:4px 11px;border-radius:999px;border:1px solid currentColor}
.bar{height:6px;background:var(--border);border-radius:999px;overflow:hidden;margin-bottom:20px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#ff6b6b);width:0;transition:.3s}

.prompt{font-size:12.5px;color:var(--text-mut);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;font-weight:700}
.qdef{font-size:18px;font-weight:500;line-height:1.5;margin-bottom:20px;color:#f2f2f2}

.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:center;gap:12px;border:1px solid var(--border);background:var(--input);
  border-radius:11px;padding:13px 15px;cursor:pointer;transition:.12s}
.opt:hover{border-color:var(--border-lit);background:var(--card-hover)}
.opt.sel{border-color:var(--accent);background:var(--accent-glow)}
.opt .key{flex:none;width:24px;height:24px;border-radius:7px;border:1px solid var(--border-lit);
  display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--text-2)}
.opt.sel .key{background:var(--accent);border-color:var(--accent);color:#fff}
.opt .txt{font-size:15px}
.opt.correct{border-color:var(--green);background:rgba(0,255,65,.08)}
.opt.correct .key{background:var(--green);border-color:var(--green);color:#000}
.opt.wrong{border-color:var(--accent);background:rgba(255,45,45,.08)}
.opt.wrong .key{background:var(--accent);border-color:var(--accent);color:#fff}
.opt.locked{cursor:default}
.opt .mark{margin-left:auto;font-size:14px;font-weight:700}

.explain{margin-top:18px;border:1px solid var(--border);border-left:3px solid var(--green);
  background:var(--card-hover);border-radius:9px;padding:14px 16px;font-size:14px}
.explain .lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--green);font-weight:700;margin-bottom:6px}
.explain .term-pair{font-size:13px;color:var(--text-2);margin-top:8px}
.explain .term-pair b{color:var(--text)}

.score-hero{text-align:center;padding:10px 0 4px}
.score-ring{font-size:52px;font-weight:800;letter-spacing:-1px}
.score-sub{color:var(--text-2);font-size:14px;margin-top:2px}
.verdict{display:inline-block;margin-top:12px;padding:7px 18px;border-radius:999px;font-weight:700;font-size:13px;border:1px solid currentColor}
.breakdown{display:flex;flex-direction:column;gap:12px}
.brow .bhead{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.brow .bhead .pct{color:var(--text-2)}
.bbar{height:8px;background:var(--border);border-radius:999px;overflow:hidden}
.bbar>i{display:block;height:100%;border-radius:999px}
.rec{border:1px solid var(--border);border-left:3px solid var(--yellow);background:var(--card-hover);
  border-radius:9px;padding:11px 15px;font-size:13.5px;margin-top:10px}
.rec b{color:var(--yellow)} .rec.good{border-left-color:var(--green)} .rec.good b{color:var(--green)}
.review-item{border:1px solid var(--border);border-radius:11px;padding:14px;margin-top:11px}
.review-item.ok{border-left:3px solid var(--green)} .review-item.no{border-left:3px solid var(--accent)}
.review-item .rq{font-size:14px;margin-bottom:7px}
.review-item .ra{font-size:13px;color:var(--text-2);margin:3px 0} .review-item .ra b{color:var(--text)}
.tiny{font-size:11.5px;color:var(--text-mut)}

/* browse */
.search{width:100%;background:var(--input);border:1px solid var(--border);border-radius:11px;color:var(--text);
  padding:13px 15px;font-size:14.5px;margin-bottom:14px}
.search:focus{outline:none;border-color:var(--accent)}
.gterm{border:1px solid var(--border);border-radius:11px;padding:13px 15px;margin-bottom:9px}
.gterm .gt{font-weight:700;font-size:14.5px}
.gterm .gt .alt{color:var(--text-mut);font-weight:400;font-size:12.5px;margin-left:8px}
.gterm .gd{font-size:13px;color:var(--text-2);margin-top:4px}
.gterm .gtag{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:999px;border:1px solid currentColor;margin-left:8px}

.footer-note{text-align:center;color:var(--text-mut);font-size:12px;margin-top:34px}
@media(max-width:680px){.modes{grid-template-columns:1fr 1fr}.qdef{font-size:16.5px}}
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="brand">
      <div class="logo">ISTQB</div>
      <div>
        <h1 id="appTitle">ISTQB Glossary Trainer</h1>
        <div class="sub" id="appSub"></div>
      </div>
    </div>
    <div class="langtoggle">
      <button id="langRu" onclick="setLang('ru')">RU</button>
      <button id="langEn" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div id="start"></div>
  <div id="quiz" class="hidden"></div>
  <div id="results" class="hidden"></div>
  <div id="browse" class="hidden"></div>

  <div class="footer-note" id="footer"></div>
</div>

<script src="terms.js"></script>
<script>
/* ============ TOPICS ============ */
const TOPICS = {
  fund:   {ru:"Основы тестирования",   en:"Fundamentals",            color:"#4dabf7"},
  levels: {ru:"Уровни тестирования",   en:"Test Levels",             color:"#00ff41"},
  types:  {ru:"Типы тестирования",     en:"Test Types",              color:"#ffd600"},
  tech:   {ru:"Техники тест-дизайна",  en:"Test Techniques",         color:"#22d3ee"},
  static: {ru:"Статическое тестирование",en:"Static Testing",        color:"#a78bfa"},
  mgmt:   {ru:"Управление тестированием",en:"Test Management",        color:"#ff9f43"},
  risk:   {ru:"Риски",                 en:"Risk",                    color:"#ff6b9d"},
  defect: {ru:"Дефекты",               en:"Defect Management",       color:"#ff2d2d"},
  quality:{ru:"Характеристики качества",en:"Quality Characteristics", color:"#2dd4bf"},
  agile:  {ru:"Agile и SDLC",          en:"Agile & SDLC",            color:"#f472b6"},
  auto:   {ru:"Инструменты и автоматизация",en:"Tools & Automation",  color:"#fb923c"},
  process:{ru:"Процесс и артефакты",   en:"Process & Work Products", color:"#94a3b8"},
};

/* ============ i18n UI ============ */
const I18N = {
  ru:{
    sub:"Подготовка по официальному глоссарию ISTQB · Foundation",
    lead:"Тренажёр по официальному глоссарию ISTQB (Foundation, "+TERMS.length+" терминов). Переключай RU/EN в любой момент — определения и разборы берутся для каждого языка отдельно, а вопрос не сбрасывается.",
    note:"EN-определения — дословно из glossary.istqb.org. RU — точный перевод официального текста (русских определений в международном API ISTQB нет).",
    modeQuick:["⚡","Быстрый тест","15 вопросов со всех тем"],
    modeTopic:["🎯","По темам","Выбери одну или несколько"],
    modeMarathon:["🏁","Марафон","Все термины подряд"],
    modeBrowse:["📖","Глоссарий","Читать все определения"],
    topicsTitle:"Темы",
    startTopic:"Начать тест →",
    pickHint:s=>`выбрано тем: ${s.t} · вопросов: ${s.n}`,
    prompt:"Какому термину соответствует определение?",
    check:"Проверить",
    next:"Дальше →",
    last:"Показать результат →",
    exit:"Выйти",
    qof:(a,b)=>`Вопрос <b>${a}</b> / ${b}`,
    answerCorrect:"Верно",
    answerWrong:"Неверно",
    correctIs:"Правильный термин:",
    yourAns:"Твой ответ:",
    explainLbl:"Определение",
    scoreSub:(g,t)=>`Набрано ${g} из ${t}`,
    verdicts:[[85,"Отлично — глоссарий освоен","var(--green)"],[70,"Хорошо — добей слабые темы","var(--yellow)"],[50,"Средне — нужна доработка","var(--orange)"],[0,"Слабо — повтори термины","var(--accent)"]],
    breakdownTitle:"Разбивка по темам",
    recsTitle:"Рекомендации",
    reviewTitle:"Разбор ответов",
    allGood:"<b>Все темы на уровне.</b> Прогони «Марафон» для закрепления и почитай определения в режиме «Глоссарий».",
    weakTip:n=>`<b>${n}:</b> повтори термины этой темы в режиме «Глоссарий», затем перепройди тест по теме.`,
    newTest:"↻ Новый тест",
    backHome:"← На главную",
    browseTitle:"Глоссарий ISTQB",
    searchPh:"Поиск термина или определения…",
    found:n=>`найдено: ${n}`,
    footer:"Данные: glossary.istqb.org · офлайн · ничего не сохраняется, кроме этого браузера",
    best:p=>`🏆 Лучший результат: <b style="color:var(--green)">${p}%</b>`,
  },
  en:{
    sub:"Prep on the official ISTQB Glossary · Foundation",
    lead:"Trainer based on the official ISTQB glossary (Foundation, "+TERMS.length+" terms). Switch RU/EN anytime — definitions and explanations are pulled per language and the question is not reset.",
    note:"EN definitions are verbatim from glossary.istqb.org. RU is a faithful translation (the international ISTQB API has no Russian definitions).",
    modeQuick:["⚡","Quick test","15 questions, all topics"],
    modeTopic:["🎯","By topic","Pick one or more"],
    modeMarathon:["🏁","Marathon","All terms in a row"],
    modeBrowse:["📖","Glossary","Read all definitions"],
    topicsTitle:"Topics",
    startTopic:"Start test →",
    pickHint:s=>`topics: ${s.t} · questions: ${s.n}`,
    prompt:"Which term matches this definition?",
    check:"Check",
    next:"Next →",
    last:"Show results →",
    exit:"Exit",
    qof:(a,b)=>`Question <b>${a}</b> / ${b}`,
    answerCorrect:"Correct",
    answerWrong:"Wrong",
    correctIs:"Correct term:",
    yourAns:"Your answer:",
    explainLbl:"Definition",
    scoreSub:(g,t)=>`Scored ${g} of ${t}`,
    verdicts:[[85,"Excellent — glossary mastered","var(--green)"],[70,"Good — close the weak topics","var(--yellow)"],[50,"Average — needs work","var(--orange)"],[0,"Weak — review the terms","var(--accent)"]],
    breakdownTitle:"By topic",
    recsTitle:"Recommendations",
    reviewTitle:"Answer review",
    allGood:"<b>All topics solid.</b> Run the Marathon to consolidate and read definitions in Glossary mode.",
    weakTip:n=>`<b>${n}:</b> review this topic's terms in Glossary mode, then retake the topic test.`,
    newTest:"↻ New test",
    backHome:"← Home",
    browseTitle:"ISTQB Glossary",
    searchPh:"Search term or definition…",
    found:n=>`found: ${n}`,
    footer:"Data: glossary.istqb.org · offline · nothing stored outside this browser",
    best:p=>`🏆 Best score: <b style="color:var(--green)">${p}%</b>`,
  }
};

/* ============ STATE ============ */
let lang = localStorage.getItem('istqb_lang') || 'ru';
let screen = 'start';
let selectedTopics = new Set();
let quiz = [];        // [{item, opts:[term,...], correct}]
let answers = [];     // chosenIndex | null
let idx = 0;
const QUICK_N = 15, TOPIC_N = 15;

function L(){ return I18N[lang]; }
function name(term){ return lang==='ru' ? term.ru : term.en; }
function def(term){ return lang==='ru' ? term.dr : term.de; }
function tname(code){ return lang==='ru' ? TOPICS[code].ru : TOPICS[code].en; }
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ============ LANGUAGE ============ */
function setLang(l){
  lang=l; localStorage.setItem('istqb_lang',l);
  document.getElementById('langRu').classList.toggle('on',l==='ru');
  document.getElementById('langEn').classList.toggle('on',l==='en');
  document.documentElement.lang=l;
  render();   // re-render current screen, state preserved
}

/* ============ ROUTER ============ */
function render(){
  document.getElementById('appSub').textContent=L().sub;
  document.getElementById('footer').textContent=L().footer;
  ['start','quiz','results','browse'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==screen));
  if(screen==='start') renderStart();
  else if(screen==='quiz') renderQuiz();
  else if(screen==='results') renderResults();
  else if(screen==='browse') renderBrowse();
}

/* ============ START ============ */
function renderStart(){
  const counts={}; TERMS.forEach(t=>counts[t.t]=(counts[t.t]||0)+1);
  const best=localStorage.getItem('istqb_best');
  const m=L();
  let chips='';
  Object.keys(TOPICS).forEach(c=>{
    const on=selectedTopics.has(c);
    chips+=`<div class="chip ${on?'on':''}" style="color:${TOPICS[c].color}" onclick="toggleTopic('${c}')">
      <span class="dot"></span><span style="color:var(--text)">${tname(c)}</span><span class="n">${counts[c]||0}</span></div>`;
  });
  const pool=[...selectedTopics].reduce((s,c)=>s+(counts[c]||0),0);
  const html=`
    <p class="lead">${m.lead}</p>
    <p class="note">${m.note}</p>
    <div class="modes">
      <button class="mode" onclick="startQuiz('quick')"><div class="ic">${m.modeQuick[0]}</div><div class="t">${m.modeQuick[1]}</div><div class="d">${m.modeQuick[2]}</div></button>
      <button class="mode" onclick="toggleTopicPicker()"><div class="ic">${m.modeTopic[0]}</div><div class="t">${m.modeTopic[1]}</div><div class="d">${m.modeTopic[2]}</div></button>
      <button class="mode" onclick="startQuiz('marathon')"><div class="ic">${m.modeMarathon[0]}</div><div class="t">${m.modeMarathon[1]}</div><div class="d">${m.modeMarathon[2]}</div></button>
      <button class="mode" onclick="openBrowse()"><div class="ic">${m.modeBrowse[0]}</div><div class="t">${m.modeBrowse[1]}</div><div class="d">${m.modeBrowse[2]}</div></button>
    </div>
    <div id="topicPicker" class="${showPicker?'':'hidden'}">
      <div class="section-title">${m.topicsTitle}</div>
      <div class="topics">${chips}</div>
      <div class="btn-row">
        <button class="btn" ${selectedTopics.size?'':'disabled'} onclick="startQuiz('topic')">${m.startTopic}</button>
        <span class="tiny">${selectedTopics.size?m.pickHint({t:selectedTopics.size,n:Math.min(TOPIC_N,pool)}):''}</span>
      </div>
    </div>
    ${best?`<div class="card" style="margin-top:18px;padding:14px 18px;font-size:13px;color:var(--text-2)">${m.best(best)}</div>`:''}`;
  document.getElementById('start').innerHTML=html;
}
let showPicker=false;
function toggleTopicPicker(){showPicker=!showPicker;renderStart();
  if(showPicker)document.getElementById('topicPicker').scrollIntoView({behavior:'smooth',block:'nearest'});}
function toggleTopic(c){selectedTopics.has(c)?selectedTopics.delete(c):selectedTopics.add(c);showPicker=true;renderStart();}

/* ============ QUIZ BUILD ============ */
function buildQuestion(item, pool){
  // 3 distractors: prefer same topic, else any
  let same=pool.filter(t=>t.t===item.t && t.en!==item.en);
  let others=pool.filter(t=>t.t!==item.t);
  let distract=shuffle(same).slice(0,3);
  if(distract.length<3) distract=distract.concat(shuffle(others).slice(0,3-distract.length));
  const opts=shuffle([item,...distract]);
  return {item, opts, correct:opts.findIndex(o=>o.en===item.en)};
}
function startQuiz(mode){
  let pool;
  if(mode==='topic') pool=TERMS.filter(t=>selectedTopics.has(t.t));
  else pool=TERMS.slice();
  let qterms;
  if(mode==='marathon') qterms=shuffle(pool);
  else qterms=shuffle(pool).slice(0, Math.min(mode==='topic'?TOPIC_N:QUICK_N, pool.length));
  quiz=qterms.map(it=>buildQuestion(it, TERMS));
  answers=quiz.map(()=>null);
  idx=0; screen='quiz'; render(); window.scrollTo(0,0);
}
function abortQuiz(){ if(confirm(lang==='ru'?'Выйти из теста? Прогресс не сохранится.':'Exit the test? Progress will be lost.')){screen='start';render();} }

/* ============ QUIZ RENDER ============ */
function renderQuiz(){
  const q=quiz[idx], m=L(), chosen=answers[idx], answered=chosen!==null;
  const letters=['A','B','C','D'];
  const tag=TOPICS[q.item.t];
  let optsHtml=q.opts.map((o,i)=>{
    let cls='opt';
    if(answered){
      cls+=' locked';
      if(i===q.correct) cls+=' correct';
      else if(i===chosen) cls+=' wrong';
    } else if(i===chosen) cls+=' sel';
    let mark='';
    if(answered && i===q.correct) mark='<span class="mark" style="color:var(--green)">✓</span>';
    else if(answered && i===chosen && i!==q.correct) mark='<span class="mark" style="color:var(--accent)">✕</span>';
    return `<div class="${cls}" ${answered?'':`onclick="pick(${i})"`}>
      <span class="key">${letters[i]}</span><span class="txt">${esc(name(o))}</span>${mark}</div>`;
  }).join('');

  let explain='';
  if(answered){
    const ok=chosen===q.correct;
    explain=`<div class="explain">
      <div class="lbl" style="color:${ok?'var(--green)':'var(--accent)'}">${ok?m.answerCorrect:m.answerWrong} · ${m.explainLbl}</div>
      ${esc(def(q.item))}
      <div class="term-pair"><b>${esc(q.item.en)}</b> &nbsp;·&nbsp; ${esc(q.item.ru)}</div>
    </div>`;
  }
  const last=idx===quiz.length-1;
  const html=`
    <div class="qtop">
      <div class="qcount">${m.qof(idx+1,quiz.length)}</div>
      <span class="cat-tag" style="color:${tag.color}">${tname(q.item.t)}</span>
    </div>
    <div class="bar"><i style="width:${idx/quiz.length*100}%"></i></div>
    <div class="card">
      <div class="prompt">${m.prompt}</div>
      <div class="qdef">${esc(def(q.item))}</div>
      <div class="opts">${optsHtml}</div>
      ${explain}
    </div>
    <div class="btn-row">
      ${answered
        ? `<button class="btn" onclick="next()">${last?m.last:m.next}</button>`
        : `<button class="btn" disabled id="needpick">${m.check}</button>`}
      <button class="btn ghost sm" onclick="abortQuiz()">${m.exit}</button>
    </div>`;
  document.getElementById('quiz').innerHTML=html;
}
function pick(i){ answers[idx]=i; renderQuiz(); }   // immediate reveal on pick
function next(){ if(idx<quiz.length-1){idx++;renderQuiz();window.scrollTo(0,0);} else {screen='results';render();window.scrollTo(0,0);} }

/* ============ RESULTS ============ */
function renderResults(){
  const m=L();
  const total=answers.reduce((s,a,i)=>s+(a===quiz[i].correct?1:0),0);
  const pct=Math.round(total/quiz.length*100);
  const best=+(localStorage.getItem('istqb_best')||0); if(pct>best)localStorage.setItem('istqb_best',pct);
  const vc=m.verdicts.find(v=>pct>=v[0]);
  const byCat={};
  quiz.forEach((q,i)=>{const c=q.item.t;byCat[c]=byCat[c]||{g:0,t:0};byCat[c].t++;if(answers[i]===q.correct)byCat[c].g++;});
  let bh=Object.keys(byCat).map(c=>{const p=Math.round(byCat[c].g/byCat[c].t*100);
    return `<div class="brow"><div class="bhead"><span style="color:${TOPICS[c].color}">${tname(c)}</span>
      <span class="pct">${byCat[c].g}/${byCat[c].t} · ${p}%</span></div>
      <div class="bbar"><i style="width:${p}%;background:${TOPICS[c].color}"></i></div></div>`;}).join('');
  const weak=Object.keys(byCat).filter(c=>byCat[c].g/byCat[c].t<0.7);
  let recs = weak.length===0 ? `<div class="rec good">${m.allGood}</div>`
    : weak.map(c=>`<div class="rec">${m.weakTip(tname(c))}</div>`).join('');
  let review=quiz.map((q,i)=>{
    const ok=answers[i]===q.correct;
    const your=answers[i]===null?'—':name(q.opts[answers[i]]);
    return `<div class="review-item ${ok?'ok':'no'}">
      <div class="rq">${i+1}. ${esc(def(q.item))}</div>
      <div class="ra"><b>${m.correctIs}</b> ${esc(name(q.item))} <span class="tiny">(${esc(q.item.en)})</span></div>
      ${ok?'':`<div class="ra" style="color:var(--accent)">${m.yourAns} ${esc(your)}</div>`}</div>`;
  }).join('');
  document.getElementById('results').innerHTML=`
    <div class="card"><div class="score-hero">
      <div class="score-ring" style="color:${pct>=80?'var(--green)':pct>=60?'var(--yellow)':'var(--accent)'}">${pct}%</div>
      <div class="score-sub">${m.scoreSub(total,quiz.length)}</div>
      <div><span class="verdict" style="color:${vc[2]}">${vc[1]}</span></div>
    </div></div>
    <div class="card" style="margin-top:16px"><div class="section-title" style="margin-top:0">${m.breakdownTitle}</div><div class="breakdown">${bh}</div></div>
    <div class="card" style="margin-top:16px"><div class="section-title" style="margin-top:0">${m.recsTitle}</div>${recs}</div>
    <div class="card" style="margin-top:16px"><div class="section-title" style="margin-top:0">${m.reviewTitle}</div>${review}</div>
    <div class="btn-row"><button class="btn" onclick="screen='start';render()">${m.newTest}</button></div>`;
}

/* ============ BROWSE ============ */
let browseQ='';
function openBrowse(){ screen='browse'; render(); window.scrollTo(0,0); }
function renderBrowse(){
  const m=L();
  const sorted=TERMS.slice().sort((a,b)=>name(a).localeCompare(name(b),lang));
  const q=browseQ.trim().toLowerCase();
  const list=sorted.filter(t=> !q ||
    t.en.toLowerCase().includes(q)||t.ru.toLowerCase().includes(q)||
    t.de.toLowerCase().includes(q)||t.dr.toLowerCase().includes(q));
  const items=list.map(t=>`<div class="gterm">
      <div class="gt">${esc(name(t))}<span class="alt">${esc(lang==='ru'?t.en:t.ru)}</span>
        <span class="gtag" style="color:${TOPICS[t.t].color}">${tname(t.t)}</span></div>
      <div class="gd">${esc(def(t))}</div></div>`).join('');
  document.getElementById('browse').innerHTML=`
    <div class="btn-row" style="margin-top:4px;margin-bottom:14px"><button class="btn ghost sm" onclick="screen='start';render()">${m.backHome}</button>
      <span class="tiny">${m.found(list.length)}</span></div>
    <div class="section-title" style="margin-top:0">${m.browseTitle}</div>
    <input class="search" id="searchBox" placeholder="${m.searchPh}" value="${esc(browseQ)}" oninput="browseQ=this.value;renderBrowseList()">
    <div id="browseList">${items}</div>`;
  const sb=document.getElementById('searchBox'); if(sb){sb.focus();sb.setSelectionRange(sb.value.length,sb.value.length);}
}
function renderBrowseList(){
  const q=browseQ.trim().toLowerCase();
  const sorted=TERMS.slice().sort((a,b)=>name(a).localeCompare(name(b),lang));
  const list=sorted.filter(t=> !q || t.en.toLowerCase().includes(q)||t.ru.toLowerCase().includes(q)||t.de.toLowerCase().includes(q)||t.dr.toLowerCase().includes(q));
  document.getElementById('browseList').innerHTML=list.map(t=>`<div class="gterm">
      <div class="gt">${esc(name(t))}<span class="alt">${esc(lang==='ru'?t.en:t.ru)}</span>
        <span class="gtag" style="color:${TOPICS[t.t].color}">${tname(t.t)}</span></div>
      <div class="gd">${esc(def(t))}</div></div>`).join('');
  const found=document.querySelector('#browse .tiny'); if(found)found.textContent=L().found(list.length);
}

/* ============ KEYBOARD ============ */
document.addEventListener('keydown',e=>{
  if(screen!=='quiz')return;
  const q=quiz[idx], answered=answers[idx]!==null;
  if(!answered){
    const map={'1':0,'2':1,'3':2,'4':3,'a':0,'b':1,'c':2,'d':3};
    const k=e.key.toLowerCase();
    if(k in map && map[k]<q.opts.length) pick(map[k]);
  } else if(e.key==='Enter') next();
});

/* ============ INIT ============ */
setLang(lang);
</script>
</body>
</html>
